name: Check airfryer price

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install

      - name: Run price check
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: npm run check

      - name: Commit updated price state
        run: |
          git config user.name "airfryer-price-bot"
          git config user.email "actions@github.com"
          git add data/last-price.json
          git diff --cached --quiet || git commit -m "chore: atualiza última checagem de preço"
          git push
